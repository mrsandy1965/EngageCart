name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    name: "Deploy → Render (Backend)"
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            | grep -q "^2" && echo "✅ Render deploy triggered" || echo "❌ Render deploy failed"

  deploy-frontend:
    name: "Deploy → Vercel (Frontend)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Deploy to Vercel (Production)
        run: |
          vercel deploy \
            --prod \
            --token "${{ secrets.VERCEL_TOKEN }}" \
            --yes \
            -e VITE_API_URL="${{ secrets.VITE_API_URL }}" \
            -e VITE_SOCKET_URL="${{ secrets.VITE_SOCKET_URL }}"
        working-directory: frontend
