name: Deploy

on:
  push:
    branches: [main]

jobs:
  # ── Backend → EC2 via SSH ────────────────────────────────────────
  deploy-ec2:
    name: "Deploy → EC2 (SSH)"
    runs-on: ubuntu-latest
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_PRIVATE_KEY: ${{ secrets.EC2_PRIVATE_KEY }}
    steps:
      - name: Check EC2 secret availability
        id: ec2-secrets
        run: |
          if [ -n "$EC2_HOST" ] && [ -n "$EC2_USER" ] && [ -n "$EC2_PRIVATE_KEY" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to EC2 via SSH
        if: steps.ec2-secrets.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key: ${{ env.EC2_PRIVATE_KEY }}
          port: 22
          script: |
            echo "🚀 Starting deployment on EC2..."

            # Pull latest code (idempotent)
            cd /home/ubuntu/EngageCart || { echo "❌ App directory not found"; exit 1; }
            git pull origin main

            # Install backend dependencies (idempotent)
            cd backend
            npm ci --omit=dev

            # Restart backend with PM2 (idempotent — pm2 restart is safe to re-run)
            pm2 restart engagecart-backend || pm2 start src/index.js --name engagecart-backend

            echo "✅ EC2 deployment complete"

      - name: Missing EC2 secrets note
        if: steps.ec2-secrets.outputs.ready != 'true'
        run: |
          echo "⚠️ EC2 deployment skipped."
          echo "   Required secrets: EC2_HOST, EC2_USER, EC2_PRIVATE_KEY"

  # ── Backend → Railway ────────────────────────────────────────────
  # Railway auto-deploys via GitHub integration — no CLI step needed.
  backend-info:
    name: "Backend → Railway (via GitHub integration)"
    runs-on: ubuntu-latest
    steps:
      - name: Railway integration note
        run: |
          echo "✅ Backend is deployed automatically by Railway's GitHub integration."
          echo "   If not connected yet: railway.app → New Project → Deploy from GitHub repo."
          echo "   Set root directory to: backend"

  # ── Frontend → Vercel ────────────────────────────────────────────
  # Vercel auto-deploys via GitHub integration — no CLI step needed.
  frontend-info:
    name: "Frontend → Vercel (via GitHub integration)"
    runs-on: ubuntu-latest
    steps:
      - name: Vercel integration note
        run: |
          echo "✅ Frontend is deployed automatically by Vercel's GitHub integration."
          echo "   If not connected yet: vercel.com → New Project → import this repo."
          echo "   Set root directory to: frontend"
