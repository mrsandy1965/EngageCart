name: Deploy

on:
  push:
    branches: [main]

jobs:
  # ── Backend → EC2 via SSH ────────────────────────────────────────
  deploy-ec2:
    name: "Deploy → EC2 (SSH)"
    runs-on: ubuntu-latest
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_PRIVATE_KEY: ${{ secrets.EC2_PRIVATE_KEY }}
    steps:
      - name: Check EC2 secret availability
        id: ec2-secrets
        run: |
          if [ -n "$EC2_HOST" ] && [ -n "$EC2_USER" ] && [ -n "$EC2_PRIVATE_KEY" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to EC2 via SSH
        if: steps.ec2-secrets.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key: ${{ env.EC2_PRIVATE_KEY }}
          port: 22
          script: |
            echo "🚀 Starting deployment on EC2..."

            # Pull latest code (idempotent)
            cd /home/ubuntu/EngageCart || { echo "❌ App directory not found"; exit 1; }
            git pull origin main

            # Install backend dependencies (idempotent)
            cd backend
            npm ci --omit=dev

            # Restart backend with PM2 (idempotent — pm2 restart is safe to re-run)
            pm2 restart engagecart-backend || pm2 start src/index.js --name engagecart-backend

            echo "✅ EC2 deployment complete"

      - name: Missing EC2 secrets note
        if: steps.ec2-secrets.outputs.ready != 'true'
        run: |
          echo "⚠️ EC2 deployment skipped."
          echo "   Required secrets: EC2_HOST, EC2_USER, EC2_PRIVATE_KEY"

  # ── Backend → ECS (Fargate) ──────────────────────────────────────
  deploy-ecs-backend:
    name: "Deploy Backend → AWS ECS"
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
    steps:
      - name: Check AWS secret availability
        id: aws-secrets
        run: |
          if [ -n "$AWS_ACCESS_KEY_ID" ] && [ -n "$AWS_SECRET_ACCESS_KEY" ] && [ -n "$AWS_SESSION_TOKEN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code
        if: steps.aws-secrets.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        if: steps.aws-secrets.outputs.ready == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        if: steps.aws-secrets.outputs.ready == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR (Backend)
        if: steps.aws-secrets.outputs.ready == 'true'
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: engagecart-backend
          IMAGE_TAG: ${{ github.sha }}
        working-directory: ./backend
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Fill in the new image ID in the Amazon ECS task definition
        if: steps.aws-secrets.outputs.ready == 'true'
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: backend/task-definition.json
          container-name: engagecart-backend-container
          image: ${{ steps.build-image.outputs.image }}
          environment-variables: |
            MONGO_URI=${{ secrets.MONGO_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
            CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
            CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
            PORT=5001
            NODE_ENV=production

      - name: Deploy Amazon ECS task definition
        if: steps.aws-secrets.outputs.ready == 'true'
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: engagecart-backend-service
          cluster: engagecart-cluster
          wait-for-service-stability: true

      - name: Missing AWS secrets note
        if: steps.aws-secrets.outputs.ready != 'true'
        run: |
          echo "⚠️ ECS Backend deployment skipped."
          echo "   Required secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY"

  # ── Frontend → ECS (Fargate) ─────────────────────────────────────
  deploy-ecs-frontend:
    name: "Deploy Frontend → AWS ECS"
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
    steps:
      - name: Check AWS secret availability
        id: aws-secrets
        run: |
          if [ -n "$AWS_ACCESS_KEY_ID" ] && [ -n "$AWS_SECRET_ACCESS_KEY" ] && [ -n "$AWS_SESSION_TOKEN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code
        if: steps.aws-secrets.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        if: steps.aws-secrets.outputs.ready == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        if: steps.aws-secrets.outputs.ready == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR (Frontend)
        if: steps.aws-secrets.outputs.ready == 'true'
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: engagecart-frontend
          IMAGE_TAG: ${{ github.sha }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_SOCKET_URL: ${{ secrets.VITE_SOCKET_URL }}
        working-directory: ./frontend
        run: |
          docker build \
            --build-arg VITE_API_URL=$VITE_API_URL \
            --build-arg VITE_SOCKET_URL=$VITE_SOCKET_URL \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Fill in the new image ID in the Amazon ECS task definition
        if: steps.aws-secrets.outputs.ready == 'true'
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: frontend/task-definition.json
          container-name: engagecart-frontend-container
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy Amazon ECS task definition
        if: steps.aws-secrets.outputs.ready == 'true'
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: engagecart-frontend-service
          cluster: engagecart-cluster
          wait-for-service-stability: true

      - name: Missing AWS secrets note
        if: steps.aws-secrets.outputs.ready != 'true'
        run: |
          echo "⚠️ ECS Frontend deployment skipped."
          echo "   Required secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY"