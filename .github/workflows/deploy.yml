name: Deploy

on:
  push:
    branches: [main]

jobs:
  # ── Backend → Render ─────────────────────────────────────────────
  deploy-backend:
    name: "Deploy → Render (Backend)"
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "⚠️  RENDER_DEPLOY_HOOK_URL secret not set — skipping Render deploy"
            exit 0
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$RENDER_DEPLOY_HOOK_URL")
          echo "Render response: $STATUS"
          if [[ "$STATUS" =~ ^2 ]]; then
            echo "✅ Render deploy triggered successfully"
          else
            echo "❌ Render deploy hook returned $STATUS"
            exit 1
          fi

  # ── Backend → EC2 via SSH ────────────────────────────────────────
  deploy-ec2:
    name: "Deploy → EC2 (SSH)"
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: ${{ secrets.EC2_HOST != '' && secrets.EC2_USER != '' && secrets.EC2_PRIVATE_KEY != '' }}
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          port: 22
          script: |
            echo "🚀 Starting deployment on EC2..."

            # Pull latest code (idempotent)
            cd /home/ubuntu/EngageCart || { echo "❌ App directory not found"; exit 1; }
            git pull origin main

            # Install backend dependencies (idempotent)
            cd backend
            npm ci --omit=dev

            # Restart backend with PM2 (idempotent — pm2 restart is safe to re-run)
            pm2 restart engagecart-backend || pm2 start src/index.js --name engagecart-backend

            echo "✅ EC2 deployment complete"

  ec2-info:
    name: "EC2 deployment skipped (missing secrets)"
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: ${{ !(secrets.EC2_HOST != '' && secrets.EC2_USER != '' && secrets.EC2_PRIVATE_KEY != '') }}
    steps:
      - name: Missing EC2 secrets note
        run: |
          echo "⚠️ EC2 deployment skipped."
          echo "   Required secrets: EC2_HOST, EC2_USER, EC2_PRIVATE_KEY"

  # ── Frontend → Vercel ────────────────────────────────────────────
  # Vercel auto-deploys via GitHub integration — no CLI step needed.
  frontend-info:
    name: "Frontend → Vercel (via GitHub integration)"
    runs-on: ubuntu-latest
    steps:
      - name: Vercel integration note
        run: |
          echo "✅ Frontend is deployed automatically by Vercel's GitHub integration."
          echo "   If not connected yet: vercel.com → New Project → import this repo."
          echo "   Set root directory to: frontend"
