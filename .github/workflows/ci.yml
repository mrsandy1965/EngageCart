name: CI Pipeline

on:
  push:
    branches: [main, "feature/*"]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Jobs ─────────────────────────────────────────────────
  backend-lint:
    name: "Backend › Lint"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Run lint
        run: npm run lint
        working-directory: backend

  backend-test:
    name: "Backend › Tests (Node ${{ matrix.node }})"
    runs-on: ubuntu-latest
    needs: backend-lint
    strategy:
      matrix:
        node: ["18", "20"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Run tests with coverage
        run: npm test -- --coverage --coverageReporters=lcov --coverageReporters=text
        working-directory: backend
        env:
          NODE_ENV: test

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: matrix.node == '20'
        with:
          name: backend-coverage
          path: backend/coverage/lcov.info
          retention-days: 7

  # ── Frontend Jobs ───────────────────────────────────────────────
  frontend-lint:
    name: "Frontend › Lint"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run lint
        run: npm run lint
        working-directory: frontend

  frontend-test:
    name: "Frontend › Tests"
    runs-on: ubuntu-latest
    needs: frontend-lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run tests with coverage
        run: npm run test:coverage -- --coverageReporters=lcov --coverageReporters=text
        working-directory: frontend
        env:
          NODE_ENV: test

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage/lcov.info
          retention-days: 7

  frontend-build:
    name: "Frontend › Build"
    runs-on: ubuntu-latest
    needs: [frontend-lint, frontend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:5001/api
          VITE_SOCKET_URL: http://localhost:5001
